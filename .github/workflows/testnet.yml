name: Testnet Faucet

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  testnet:
    runs-on: ubuntu-latest
    environment: testnet
    env:
      TESTNET_PRIVATE_KEY: ${{ secrets.TESTNET_PRIVATE_KEY }}
      CHAINSTACK_API_KEY: ${{ secrets.CHAINSTACK_API_KEY }}
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
      OP_SEPOLIA_RPC_URL: ${{ secrets.OP_SEPOLIA_RPC_URL }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      ZKSYNC_SEPOLIA_RPC_URL: ${{ secrets.ZKSYNC_SEPOLIA_RPC_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run testnet faucet tests
        run: uv run pytest -m testnet tests/test_faucet_live.py -vvv -s
